<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1404">
<title>ADHD Brain OS — Bold — Monthly Spread Left</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1404px; height: 1872px; overflow: hidden; background: #FAFAFA; }
.page { width: 1404px; height: 1872px; background: #FAFAFA; position: relative; font-family: 'DM Sans', sans-serif; }

.chapter-tab { position: absolute; left: 0; top: 220px; width: 8px; height: 80px; background: #EA580C; border-radius: 0 4px 4px 0; }
.page-num { position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%); font-size: 18px; font-weight: 300; color: #64748B; letter-spacing: 0.12em; }
.corner-tl { position: absolute; top: 56px; left: 56px; width: 36px; height: 36px; border-top: 1px solid #E2E8F0; border-left: 1px solid #E2E8F0; }
.corner-br { position: absolute; bottom: 56px; right: 56px; width: 36px; height: 36px; border-bottom: 1px solid #E2E8F0; border-right: 1px solid #E2E8F0; }

.content { position: absolute; top: 100px; left: 90px; right: 90px; bottom: 100px; display: flex; flex-direction: column; }

/* Month header */
.month-header { margin-bottom: 48px; }
.month-eyebrow { font-size: 16px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: #EA580C; margin-bottom: 10px; }
.month-title-row { display: flex; align-items: flex-end; justify-content: space-between; }
.month-name { font-family: 'Cormorant Garamond', serif; font-size: 110px; font-weight: 300; font-style: italic; color: #111111; line-height: 0.9; }
.month-field { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; padding-bottom: 12px; }
.month-field-label { font-size: 14px; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; color: #64748B; }
.month-field-line { width: 160px; height: 1px; background: #E2E8F0; }

/* Mood + energy row */
.mood-row { display: flex; gap: 12px; margin-bottom: 40px; }
.mood-chip { background: #FFFFFF; border: 0.5px solid #E2E8F0; border-radius: 40px; padding: 10px 22px; font-size: 18px; font-weight: 300; color: #64748B; display: flex; align-items: center; gap: 10px; }
.mood-chip-label { font-size: 13px; font-weight: 500; color: #64748B; letter-spacing: 0.08em; text-transform: uppercase; margin-right: 4px; }
.mood-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid #E2E8F0; }

/* Intentions section */
.section-label { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #7C3AED; margin-bottom: 14px; }

.intentions-card { background: #FFFFFF; border: 0.5px solid #E2E8F0; border-radius: 16px; padding: 32px 36px; margin-bottom: 20px; }
.fill-line { height: 1px; background: #F5F3FF; margin-bottom: 28px; }
.fill-line:last-child { margin-bottom: 0; }
.fill-line-dotted { height: 1px; border-top: 1px dashed #E2E8F0; margin-bottom: 28px; }

/* Two column intentions */
.two-col-intents { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.intent-mini { background: #FFFFFF; border: 0.5px solid #E2E8F0; border-radius: 12px; padding: 24px 28px; }
.intent-mini-label { font-size: 13px; font-weight: 500; color: #EA580C; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; }

/* Habit tracker */
.habit-tracker { background: #111111; border-radius: 16px; padding: 32px 36px; flex: 1; }
.habit-tracker-title { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(250,250,250,0.4); margin-bottom: 24px; }

.habit-header-row { display: grid; grid-template-columns: 200px repeat(5, 1fr); gap: 0; margin-bottom: 16px; }
.habit-week-label { font-size: 12px; font-weight: 500; color: rgba(250,250,250,0.3); text-align: center; letter-spacing: 0.06em; }

.habit-row { display: grid; grid-template-columns: 200px repeat(5, 1fr); gap: 0; align-items: center; margin-bottom: 18px; }
.habit-row:last-child { margin-bottom: 0; }
.habit-name-line { height: 1px; background: rgba(250,250,250,0.15); flex: 1; margin-right: 16px; }
.habit-name-wrap { display: flex; align-items: center; gap: 8px; padding-right: 16px; }
.habit-num { font-size: 11px; color: rgba(250,250,250,0.25); font-weight: 500; flex-shrink: 0; }
.habit-line { height: 1px; background: rgba(250,250,250,0.12); flex: 1; }
.habit-circle-wrap { display: flex; justify-content: center; }
.habit-circle { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid rgba(250,250,250,0.2); }

.habit-note { font-family: 'Caveat', cursive; font-size: 22px; color: rgba(250,250,250,0.25); margin-top: 20px; }

    /* Bold chapter color override */
    .chapter-tab { background: #EA580C !important; }
    .eyebrow { color: #EA580C !important; }
    .month-eyebrow { color: #EA580C !important; }
    .sec-label { color: #EA580C !important; }
    .card-label { color: #EA580C !important; }
    
</style>
</head>
