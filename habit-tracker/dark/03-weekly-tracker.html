<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1404">
<title>Habit Tracker Bundle — Weekly — Dark Theme</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1404px;height:1872px;overflow:hidden;background:#0F111A}
.page{width:1404px;height:1872px;background:#0F111A;position:relative;font-family:'DM Sans', sans-serif}
.chapter-tab{position:absolute;left:0;top:220px;width:8px;height:80px;background:#E94560;border-radius:0 4px 4px 0}
.page-num{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);font-size:18px;font-weight:300;color:#8892A4;letter-spacing:.12em}
.corner-tl{position:absolute;top:56px;left:56px;width:36px;height:36px;border-top:1px solid #2A2D3E;border-left:1px solid #2A2D3E}
.corner-br{position:absolute;bottom:56px;right:56px;width:36px;height:36px;border-bottom:1px solid #2A2D3E;border-right:1px solid #2A2D3E}
.content{position:absolute;top:100px;left:90px;right:90px;bottom:90px;display:flex;flex-direction:column}
.eyebrow{font-size:16px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:#4FC3C8;margin-bottom:10px}
.title{font-family:'Cormorant Garamond', serif;font-size:72px;font-weight:300;font-style:italic;color:#E8EAF0;line-height:.95;margin-bottom:10px}
.subtitle{font-size:20px;font-weight:300;color:#8892A4;margin-bottom:20px;line-height:1.5}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#4FC3C8;margin-bottom:12px}
.card{background:#1A1D2E;border:0.5px solid #2A2D3E;border-radius:16px;padding:28px 32px}
.card-accent{background:#1F2A3C;border:0.5px solid #1E6A6E;border-radius:16px;padding:28px 32px}
.card-dark{background:#E8EAF0;border-radius:16px;padding:28px 32px}
.fill-line{height:1px;background:#1A1D2E;margin-bottom:18px}
.fill-line:last-child{margin-bottom:0}

.wcard{background:#1A1D2E;border:0.5px solid #2A2D3E;border-radius:16px;padding:24px 28px;margin-bottom:16px}
.wgrid-h{display:grid;grid-template-columns:1fr repeat(7,44px);margin-bottom:8px}
.wdh{text-align:center;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#4FC3C8}
.hrow{display:grid;grid-template-columns:1fr repeat(7,44px);align-items:center;margin-bottom:12px}
.hrow:last-child{margin-bottom:0}
.hname{display:flex;align-items:center;gap:8px;padding-right:12px}
.hdot{width:8px;height:8px;border-radius:50%;background:#1F2A3C;flex-shrink:0}
.hline{flex:1;height:1px;background:#1A1D2E}
.hc{display:flex;justify-content:center}
.hcircle{width:24px;height:24px;border-radius:50%;border:1.5px solid #2A2D3E}
.ecard{background:#1A1D2E;border:0.5px solid #2A2D3E;border-radius:16px;padding:24px 28px;margin-bottom:16px}
.ecols{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:10px}
.ecol{display:flex;flex-direction:column;align-items:center;gap:6px}
.edlbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#4FC3C8}
.eblock{width:100%;height:60px;background:#1A1D2E;border:1.5px solid #2A2D3E;border-radius:8px}
.ebar{flex:1;height:4px;border-radius:2px;background:linear-gradient(to right,#1F2A3C,#2AA8AE)}
.reflections{background:#1F2A3C;border-radius:16px;padding:24px 28px;flex:1;display:flex;flex-direction:column;gap:16px}
.rq{font-size:18px;font-weight:300;color:#E8EAF0}
.rl{height:1px;background:rgba(0,0,0,.08);margin-top:6px}

</style>
</head>
<body>
<div class="page" data-document-role="page">
  <div class="chapter-tab"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="content">

    <div>
      <div class="eyebrow">Habit Tracker Bundle</div>
      <div class="title">Weekly<br>Tracker</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:16px;margin-top:16px">
      <div class="wcard">
        <div class="sec-label">Habit tracker</div>
        <div class="wgrid-h"><div></div><div class="wdh">M</div><div class="wdh">T</div><div class="wdh">W</div><div class="wdh">T</div><div class="wdh">F</div><div class="wdh">S</div><div class="wdh">S</div></div>
        <div class="hrow"><div class="hname"><div class="hdot"></div><div class="hline"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div></div><div class="hrow"><div class="hname"><div class="hdot"></div><div class="hline"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div></div><div class="hrow"><div class="hname"><div class="hdot"></div><div class="hline"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div></div><div class="hrow"><div class="hname"><div class="hdot"></div><div class="hline"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div></div><div class="hrow"><div class="hname"><div class="hdot"></div><div class="hline"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div><div class="hc"><div class="hcircle"></div></div></div>
      </div>
      <div class="ecard">
        <div class="sec-label">Energy forecast — color in each day</div>
        <div class="ecols"><div class="ecol"><div class="edlbl">Mon</div><div class="eblock"></div></div><div class="ecol"><div class="edlbl">Tue</div><div class="eblock"></div></div><div class="ecol"><div class="edlbl">Wed</div><div class="eblock"></div></div><div class="ecol"><div class="edlbl">Thu</div><div class="eblock"></div></div><div class="ecol"><div class="edlbl">Fri</div><div class="eblock"></div></div><div class="ecol"><div class="edlbl">Sat</div><div class="eblock"></div></div><div class="ecol"><div class="edlbl">Sun</div><div class="eblock"></div></div></div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#8892A4">
          <span>low</span><div class="ebar"></div><span>high</span>
        </div>
      </div>
      <div class="reflections">
        <div class="rq">This week I want to feel<div class="rl"></div><div class="rl"></div></div>
        <div class="rq">One thing I'll celebrate<div class="rl"></div></div>
        <div class="rq">What I'm carrying forward<div class="rl"></div></div>
      </div>
    </div>

  </div>
  <div class="page-num">03</div>
</div>
</body>
</html>
