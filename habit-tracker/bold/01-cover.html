<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1404">
<title>ADHD Habit Tracker Bundle — Bold</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1404px;height:1872px;overflow:hidden;background:#EA580C}
.page{width:1404px;height:1872px;background:#EA580C;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 120px;overflow:hidden}
.page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 30%,rgba(0,0,0,.2) 0%,transparent 60%);z-index:0}
.c{position:relative;z-index:1}
.tag{font-family:'Caveat', cursive;font-size:28px;color:rgba(246,243,238,.55);margin-bottom:20px}
.h{font-family:'Cormorant Garamond', serif;font-size:96px;font-weight:300;color:#F6F3EE;line-height:.9;margin-bottom:24px}
.s{font-size:20px;font-weight:300;color:rgba(246,243,238,.6);letter-spacing:.1em;text-transform:uppercase;margin-bottom:48px}
.dots{display:flex;gap:20px;justify-content:center;margin-bottom:40px}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(246,243,238,.25)}
.inc{border:0.5px solid rgba(246,243,238,.2);border-radius:12px;padding:20px 32px;display:flex;flex-direction:column;gap:8px;margin-top:0}
.inc-item{font-size:17px;font-weight:300;color:rgba(246,243,238,.55)}
.corner-tl{position:absolute;top:56px;left:56px;width:36px;height:36px;border-top:1px solid rgba(246,243,238,.18);border-left:1px solid rgba(246,243,238,.18);z-index:1}
.corner-br{position:absolute;bottom:56px;right:56px;width:36px;height:36px;border-bottom:1px solid rgba(246,243,238,.18);border-right:1px solid rgba(246,243,238,.18);z-index:1}
</style>
</head>
<body>
<div class="page">
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="c">
    <div class="tag">ADHD Brain OS</div>
    <div class="h">Habit<br>Tracker<br>Bundle</div>
    <div class="s">Visual streaks · Dopamine friendly</div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="inc">
      <div class="inc-item">✦ Monthly habit tracker (8 habits × 31 days)</div>
      <div class="inc-item">✦ Weekly habit tracker (5 habits × 7 days)</div>
      <div class="inc-item">✦ All 3 color themes included</div>
      <div class="inc-item">✦ Undated · Reusable · Printable + Digital</div>
    </div>
  </div>
</div>
</body>
</html>
