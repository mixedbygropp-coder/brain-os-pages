<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1404px;height:1872px;overflow:hidden;background:#F6F3EE}

.chapter-tab{position:absolute;left:0;top:220px;width:8px;height:80px;background:#7B9E87;border-radius:0 4px 4px 0}
.page-num{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);font-size:18px;font-weight:300;color:#7A8278;letter-spacing:.12em}
.corner-tl{position:absolute;top:56px;left:56px;width:36px;height:36px;border-top:1px solid #DDD8D0;border-left:1px solid #DDD8D0}
.corner-br{position:absolute;bottom:56px;right:56px;width:36px;height:36px;border-bottom:1px solid #DDD8D0;border-right:1px solid #DDD8D0}

.eyebrow{font-size:16px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:#7B9E87;margin-bottom:10px}
.title{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:300;font-style:italic;color:#1A1F1C;line-height:.95;margin-bottom:10px}
.subtitle{font-size:20px;font-weight:300;color:#7A8278;margin-bottom:4px}
.wins-note{background:#EDF3EF;border-radius:12px;padding:14px 24px;font-family:'Caveat',cursive;font-size:26px;color:#3D6148}
/* Wins log table */
.wins-card{background:white;border:0.5px solid #DDD8D0;border-radius:20px;overflow:hidden;flex:1;display:flex;flex-direction:column}
.wins-header{display:grid;grid-template-columns:80px 1fr 1fr 160px;background:#EDF3EF;padding:14px 24px;gap:16px}
.wins-col-head{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#3D6148}
.wins-rows{flex:1;display:flex;flex-direction:column}
.win-row{display:grid;grid-template-columns:80px 1fr 1fr 160px;padding:14px 24px;gap:16px;border-bottom:0.5px solid #F6F3EE;align-items:center}
.win-row:last-child{border-bottom:none}
.win-row:nth-child(even){background:#FAFAF8}
.win-date{font-size:12px;font-weight:300;color:#DDD8D0;font-family:'DM Sans',sans-serif}
.win-cell-line{height:1px;background:#F0EDE8}
.win-stars{display:flex;gap:4px}
.win-star{font-size:14px;color:#EDF3EF}
/* Bottom */
.bottom-strip{background:#1A1F1C;border-radius:0 0 20px 20px;padding:20px 24px;text-align:center}
.bottom-text{font-family:'Caveat',cursive;font-size:28px;color:rgba(246,243,238,.5)}
