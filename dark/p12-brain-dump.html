<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1404">
<title>ADHD Brain OS — Dark — Brain Dump</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1404px;height:1872px;overflow:hidden;background:#0F111A}
.page{width:1404px;height:1872px;background:#0F111A;position:relative;font-family:'DM Sans',sans-serif}
.chapter-tab{position:absolute;left:0;top:220px;width:8px;height:80px;background:#E94560;border-radius:0 4px 4px 0}
.page-num{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);font-size:18px;font-weight:300;color:#8892A4;letter-spacing:.12em}
.corner-tl{position:absolute;top:56px;left:56px;width:36px;height:36px;border-top:1px solid #2A2D3E;border-left:1px solid #2A2D3E}
.corner-br{position:absolute;bottom:56px;right:56px;width:36px;height:36px;border-bottom:1px solid #2A2D3E;border-right:1px solid #2A2D3E}
.content{position:absolute;top:100px;left:90px;right:90px;bottom:90px;display:flex;flex-direction:column;gap:20px}
.page-header{margin-bottom:8px}
.eyebrow{font-size:16px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:#E94560;margin-bottom:10px}
.title{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:300;font-style:italic;color:#E8EAF0;line-height:.95;margin-bottom:10px}
.subtitle{font-size:22px;font-weight:300;color:#8892A4;line-height:1.5}
.dump-card{background:#1A1D2E;border:0.5px solid #2A2D3E;border-radius:20px;padding:40px 48px;flex:1;display:flex;flex-direction:column}
.dump-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.dump-title{font-family:'Caveat',cursive;font-size:36px;color:#2AA8AE}
.dump-hint{font-size:16px;font-weight:300;color:#2A2D3E;letter-spacing:.06em}
.dump-zones{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
.zone{border:0.5px dashed #1A1D2E;border-radius:12px;padding:16px 20px}
.zone-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#2A2D3E;margin-bottom:16px}
.zone-lines{display:flex;flex-direction:column;gap:18px}
.zone-line{height:1px;background:#0F111A}
.dump-freeform{flex:1;display:flex;flex-direction:column}
.freeform-label{font-family:'Caveat',cursive;font-size:22px;color:#1A1D2E;margin-bottom:16px}
.freeform-lines{display:flex;flex-direction:column;gap:22px;flex:1}
.freeform-line{height:1px;background:#1A1D2E}
.dot-grid{flex:1;position:relative;overflow:hidden}

    /* ── DARK MODE OVERRIDES ── */
    html, body { background: #0F111A !important; }
    .page { background: #0F111A !important; }
    input, textarea { color: #E8EAF0; background: #1A1D2E; }
    
</style>
</head>
<body>
<div class="page" data-document-role="page" data-label="Brain Dump">
  <div class="chapter-tab"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="content">
    <div class="page-header">
      <div class="eyebrow">Focus Toolkit</div>
      <div class="title">Brain Dump</div>
      <div class="subtitle">Get it out of your head and onto the page. Your brain isn't a storage device.</div>
    </div>
    <div class="dump-card">
      <div class="dump-header">
        <div class="dump-title">🧠 Everything in my head right now</div>
        <div class="dump-hint">no filter · no order · no judgment</div>
      </div>
      <div class="dump-zones">
        <div class="zone">
          <div class="zone-label">📋 Tasks &amp; to-dos</div>
          <div class="zone-lines">
            <div class="zone-line"></div><div class="zone-line"></div><div class="zone-line"></div>
            <div class="zone-line"></div><div class="zone-line"></div><div class="zone-line"></div>
          </div>
        </div>
        <div class="zone">
          <div class="zone-label">💡 Ideas &amp; thoughts</div>
          <div class="zone-lines">
            <div class="zone-line"></div><div class="zone-line"></div><div class="zone-line"></div>
            <div class="zone-line"></div><div class="zone-line"></div><div class="zone-line"></div>
          </div>
        </div>
        <div class="zone">
          <div class="zone-label">😰 Worries &amp; anxieties</div>
          <div class="zone-lines">
            <div class="zone-line"></div><div class="zone-line"></div><div class="zone-line"></div>
            <div class="zone-line"></div><div class="zone-line"></div><div class="zone-line"></div>
          </div>
        </div>
        <div class="zone">
          <div class="zone-label">✨ Random &amp; miscellaneous</div>
          <div class="zone-lines">
            <div class="zone-line"></div><div class="zone-line"></div><div class="zone-line"></div>
            <div class="zone-line"></div><div class="zone-line"></div><div class="zone-line"></div>
          </div>
        </div>
      </div>
      <div class="dump-freeform">
        <div class="freeform-label">or just write freely ↓</div>
        <div class="freeform-lines">
          <div class="freeform-line"></div><div class="freeform-line"></div><div class="freeform-line"></div>
          <div class="freeform-line"></div><div class="freeform-line"></div><div class="freeform-line"></div>
          <div class="freeform-line"></div><div class="freeform-line"></div><div class="freeform-line"></div>
          <div class="freeform-line"></div><div class="freeform-line"></div><div class="freeform-line"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="page-num">12</div>
</div>
</body>
</html>
