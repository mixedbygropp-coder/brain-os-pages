<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1404">
<title>ADHD Brain OS — Dark — Weekly Spread Right</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1404px; height: 1872px; overflow: hidden; background: #0F111A; }
.page { width: 1404px; height: 1872px; background: #0F111A; position: relative; font-family: 'DM Sans', sans-serif; }

.chapter-tab { position: absolute; left: 0; top: 220px; width: 8px; height: 80px; background: #4FC3C8; border-radius: 0 4px 4px 0; }
.page-num { position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%); font-size: 18px; font-weight: 300; color: #8892A4; letter-spacing: 0.12em; }
.corner-tl { position: absolute; top: 56px; left: 56px; width: 36px; height: 36px; border-top: 1px solid #2A2D3E; border-left: 1px solid #2A2D3E; }
.corner-br { position: absolute; bottom: 56px; right: 56px; width: 36px; height: 36px; border-bottom: 1px solid #2A2D3E; border-right: 1px solid #2A2D3E; }

.content { position: absolute; top: 100px; left: 90px; right: 90px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; }

.section-label { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #4FC3C8; margin-bottom: 14px; }

/* Habit tracker */
.habit-card { background: #1A1D2E; border: 0.5px solid #2A2D3E; border-radius: 16px; padding: 28px 32px; }

.habit-grid-header { display: grid; grid-template-columns: 1fr repeat(7, 44px); gap: 0; margin-bottom: 10px; }
.habit-day-head { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #4FC3C8; }
.habit-day-head.wknd { color: #E94560; }

.habit-row { display: grid; grid-template-columns: 1fr repeat(7, 44px); gap: 0; align-items: center; margin-bottom: 14px; }
.habit-row:last-child { margin-bottom: 0; }
.habit-name { display: flex; align-items: center; gap: 8px; padding-right: 12px; }
.habit-dot { width: 8px; height: 8px; border-radius: 50%; background: #1F2A3C; flex-shrink: 0; }
.habit-name-line { flex: 1; height: 1px; background: #1F2A3C; }
.habit-cell { display: flex; justify-content: center; align-items: center; }
.habit-circle { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid #2A2D3E; }

/* Energy forecast */
.energy-card { background: #1A1D2E; border: 0.5px solid #2A2D3E; border-radius: 16px; padding: 28px 32px; }

.energy-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 12px; }
.energy-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.energy-day-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #4FC3C8; }
.energy-day-label.wknd { color: #E94560; }
.energy-block { width: 100%; height: 72px; background: #0F111A; border: 1.5px solid #1F2A3C; border-radius: 8px; }

.energy-scale { display: flex; align-items: center; gap: 8px; }
.energy-scale-bar { flex: 1; height: 4px; border-radius: 2px; background: linear-gradient(to right, #1F2A3C, #2AA8AE); }
.energy-scale-label { font-size: 12px; font-weight: 300; color: #8892A4; }

/* Reflection prompts */
.prompts-card { background: #1F2A3C; border-radius: 16px; padding: 28px 32px; flex: 1; display: flex; flex-direction: column; gap: 20px; }

.prompt-item { display: flex; flex-direction: column; gap: 10px; }
.prompt-q { font-size: 18px; font-weight: 300; color: #E8EAF0; }
.prompt-line { height: 1px; background: rgba(79,195,200,0.3); }

/* Notes section */
.notes-card { background: #1A1D2E; border: 0.5px solid #2A2D3E; border-radius: 16px; padding: 24px 32px; }
.notes-lines { display: flex; flex-direction: column; gap: 18px; }
.notes-line { height: 1px; background: #1A1D2E; }

    /* ── DARK MODE OVERRIDES ── */
    html, body { background: #0F111A !important; }
    .page { background: #0F111A !important; }
    input, textarea { color: #E8EAF0; background: #1A1D2E; }
    
</style>
</head>
